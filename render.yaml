services:
  - type: web
    name: skillforge-ai-backend
    env: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 60
    envVars:
      - key: POSTGRES_URL
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.0"

